# .github/workflows/webhook-branch.yml
name: Webhook Triggered Branch Workflow

# Triggered by repository_dispatch from an external webhook
on:
  repository_dispatch:
    types: [new-branch-webhook]

jobs:
  print-new-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Print webhook payload
        run: |
          echo "Webhook triggered workflow!"
          echo "Branch name (from payload): ${{ github.event.client_payload.branch }}"
          echo "Full payload:"
          echo '${{ toJson(github.event.client_payload) }}'
